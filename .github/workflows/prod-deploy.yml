name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check || echo "Type check failed but continuing"

      - name: Build
        run: |
          set -o pipefail
          npm run build 2>&1 | tee /tmp/build.log

      - name: Show build error tail
        if: failure()
        run: tail -40 /tmp/build.log

      - name: Deploy to Firebase Production
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GCLOUD_PROJECT: dilly-portfolio
        run: |
          set -o pipefail
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is empty or not set"
            exit 1
          fi
          # Print metadata about the secret WITHOUT leaking its value
          python3 <<'PY'
          import os
          v = os.environ.get('FIREBASE_SERVICE_ACCOUNT', '')
          print(f"FIREBASE_SERVICE_ACCOUNT length: {len(v)} bytes")
          stripped = v.strip()
          print(f"After strip length: {len(stripped)} bytes")
          if stripped:
              print(f"First non-whitespace char ord: {ord(stripped[0])} (123 = '{{')")
              print(f"Last non-whitespace char ord: {ord(stripped[-1])} (125 = '}}')")
          else:
              print("Secret is whitespace-only — needs to contain the full JSON")
          PY
          KEY_FILE="$RUNNER_TEMP/firebase-key.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          echo "Key file size: $(wc -c < "$KEY_FILE") bytes"
          # Sanity-check the JSON (prints field names only, never values)
          python3 - "$KEY_FILE" <<'PY'
          import json, sys
          try:
              d = json.load(open(sys.argv[1]))
              print("Service account JSON parsed OK")
              print("Fields present:", sorted(d.keys()))
              print("type:", d.get("type", "MISSING"))
              print("project_id:", d.get("project_id", "MISSING"))
              print("client_email present:", bool(d.get("client_email")))
              print("private_key present:", bool(d.get("private_key")))
          except Exception as e:
              print(f"::error::Service account JSON failed to parse: {e}")
              sys.exit(1)
          PY
          export GOOGLE_APPLICATION_CREDENTIALS="$KEY_FILE"
          npx --yes firebase-tools@latest --version
          npx --yes firebase-tools@latest deploy \
            --only hosting:production \
            --project dilly-portfolio \
            --non-interactive 2>&1 | tee /tmp/deploy.log
          DEPLOY_EXIT=${PIPESTATUS[0]}
          rm -f "$KEY_FILE"
          exit "$DEPLOY_EXIT"

      - name: Show deploy error tail
        if: failure()
        run: |
          if [ -f /tmp/deploy.log ]; then
            echo "=== last 40 lines of deploy log ==="
            tail -40 /tmp/deploy.log
          fi