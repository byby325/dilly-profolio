name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check || echo "Type check failed but continuing"

      - name: Build
        id: build
        run: |
          node --version
          npm --version
          npx vite --version || true
          set -o pipefail
          npm run build 2>&1 | tee /tmp/build.log
        continue-on-error: true

      - name: Surface build error
        if: steps.build.outcome == 'failure'
        run: |
          echo "::group::Last 25 lines of build output"
          tail -25 /tmp/build.log
          echo "::endgroup::"
          # Extract any line matching error keywords and emit as annotation
          grep -niE "error|cannot find|enoent|enospc|out of memory|maximum call|failed to" /tmp/build.log | tail -20 | while IFS= read -r line; do
            clean=$(echo "$line" | sed 's/\x1b\[[0-9;]*m//g')
            echo "::error::$clean"
          done
          exit 1

      - name: Deploy to Firebase Production
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: dilly-portfolio
          channelId: live
          target: production 