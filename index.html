<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/logo-dilly.png" />

    <!-- Primary meta -->
    <title>Dilly Chen — Senior Product Designer</title>
    <meta
      name="description"
      content="Dilly Chen — Senior Product Designer crafting end-to-end SaaS experiences that balance business goals and user needs."
    />
    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Dilly Chen — Senior Product Designer" />
    <meta
      property="og:description"
      content="Senior Product Designer crafting end-to-end SaaS experiences that balance business goals and user needs."
    />
    <meta property="og:image" content="/logo-dilly.png" />
    <meta property="og:url" content="https://dillychen.com/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dilly Chen — Senior Product Designer" />
    <meta
      name="twitter:description"
      content="Senior Product Designer crafting end-to-end SaaS experiences that balance business goals and user needs."
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://rsms.me" crossorigin />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        overflow-x: hidden;
        background: #ffffff;
      }
      #app {
        width: 100%;
        min-width: 100%;
        overflow-x: hidden;
      }
      /* Pre-paint splash to avoid FOUC */
      .splash {
        position: fixed;
        inset: 0;
        background: #ffffff;
        display: grid;
        place-items: center;
        z-index: 999;
        opacity: 1;
        transition: opacity 360ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      .splash.is-hidden {
        opacity: 0;
        pointer-events: none;
      }
      .splash__dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #18181b;
        animation: splash-pulse 1.2s ease-in-out infinite;
      }
      @keyframes splash-pulse {
        0%, 100% {
          transform: scale(0.6);
          opacity: 0.4;
        }
        50% {
          transform: scale(1);
          opacity: 1;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .splash__dot {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div class="splash" id="splash" aria-hidden="true">
      <div class="splash__dot"></div>
    </div>
    <script>
      // 等 Vue 完成首次掛載後再淡出 splash
      window.addEventListener('load', () => {
        const splash = document.getElementById('splash')
        if (splash) {
          requestAnimationFrame(() => {
            splash.classList.add('is-hidden')
            setTimeout(() => splash.remove(), 500)
          })
        }
      })
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
